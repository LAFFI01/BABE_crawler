version: '3.8'

services:
  crawler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: babe-crawler
    environment:
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - DB_HOST=postgres
      - REDIS_HOST=redis
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ../config:/app/config
    depends_on:
      - postgres
      - redis
    networks:
      - crawler-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: crawler-postgres
    environment:
      - POSTGRES_USER=crawler_user
      - POSTGRES_PASSWORD=secure_password
      - POSTGRES_DB=crawler_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crawler-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: crawler-redis
    volumes:
      - redis_data:/data
    networks:
      - crawler-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  crawler-network:
    driver: bridge
