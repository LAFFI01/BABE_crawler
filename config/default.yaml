# Default Crawler Configuration

crawler:
  # Basic settings
  name: "BABE_Crawler"
  start_urls:
    - "https://example.com"
  
  # Performance
  max_workers: 5
  request_timeout: 10
  retry_attempts: 3
  retry_delay: 5
  backoff_factor: 1.5

# Parsing settings
parser:
  engine: "beautifulsoup"  # beautifulsoup or lxml
  encoding: "utf-8"

# Proxy settings
proxy:
  enabled: false
  rotation: false
  list: []
  update_interval: 3600

# User Agent rotation
user_agent:
  rotation: true
  file: "config/user_agents.txt"

# Request headers
headers:
  Accept: "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8"
  Accept-Language: "en-US,en;q=0.5"
  DNT: "1"

# Storage
storage:
  type: "json"  # json, csv, database
  path: "./data/"
  options:
    indent: 2

# Logging
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/crawler.log"
  max_size: 10485760  # 10 MB
  backup_count: 10

# Respectful crawling
etiquette:
  respect_robots_txt: true
  respect_crawl_delay: true
  delay_between_requests: 1
  delay_between_domains: 5

# Features
features:
  cache_enabled: true
  javascript_rendering: false
  screenshot_on_error: false
